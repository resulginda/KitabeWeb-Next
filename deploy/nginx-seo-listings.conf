# Kitabe.org — Hyper-Local SEO liste URL'leri (kesfet/explore/...)
# Sorun: Yalnızca 3 segmentli yollar Next.js'e gidiyorsa
#   /tr/antalya/kesfet          → çalışır
#   /tr/antalya/kesfet/muzeler  → SPA'ya düşer (bozuk)
#
# Bu blokları mevcut kitabe.org server {} içine, SPA location'dan ÖNCE ekleyin.
# NEXT_PORT = Dokploy'daki KitabeWeb-Next container portu (ör. 3000)

# 1) Kesfet hub + alt filtreler (4+ segment)
location ~ ^/(tr|en|ru|ar)/[^/]+/(kesfet|explore|mesta|istikshaf)(/.*)?$ {
    proxy_pass http://127.0.0.1:NEXT_PORT;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 2) Yer detay sayfaları (3 segment: /tr/antalya/yer-slug)
location ~ ^/(tr|en|ru|ar)/[^/]+/[^/]+$ {
    proxy_pass http://127.0.0.1:NEXT_PORT;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 3) Next.js sitemap + revalidate API (opsiyonel, aynı container)
location = /sitemap.xml {
    proxy_pass http://127.0.0.1:NEXT_PORT;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
